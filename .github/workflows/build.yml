name: Build APK
on:
  push:
    branches: [master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
      - name: Setup Android
        run: |
          flutter create --org com.demontv --project-name demontv_reseller tmp_app
          cp -r tmp_app/android .
          rm -rf tmp_app
          sed -i 's/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">\n    <uses-permission android:name="android.permission.INTERNET"\/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"\/>/' android/app/src/main/AndroidManifest.xml
      - run: flutter pub get
      - run: flutter build apk --release --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: demontv-reseller-apk
          path: build/app/outputs/flutter-apk/app-release.apk
